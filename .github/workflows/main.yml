name: Crypto Signal Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: |
          echo "=== Starting Bot at $(date) ==="
          python bot.py
          echo "=== Bot Finished at $(date) ==="

      - name: Commit signal counter
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add signal_counter_15m.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update signal counter [$(date)]"
          git push || echo "Nothing to commit"
